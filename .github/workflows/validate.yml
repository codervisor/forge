name: Validate Skills & Actions

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'actions/**'
  pull_request:
    paths:
      - 'skills/**'
      - 'actions/**'

jobs:
  validate-skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check skill directory structure
        shell: bash
        run: |
          set -euo pipefail
          errors=0

          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            echo "📦 Checking skill: $skill_name"

            # SKILL.md must exist
            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "  ❌ Missing SKILL.md"
              errors=$((errors + 1))
              continue
            fi
            echo "  ✅ SKILL.md exists"

            # Check SKILL.md has frontmatter
            if ! head -1 "$skill_dir/SKILL.md" | grep -q '^---$'; then
              echo "  ❌ SKILL.md missing YAML frontmatter"
              errors=$((errors + 1))
            else
              echo "  ✅ SKILL.md has frontmatter"
            fi

            # Check no empty directories (except explicitly allowed)
            for subdir in "$skill_dir"*/; do
              [ ! -d "$subdir" ] && continue
              dir_name=$(basename "$subdir")
              if [ -z "$(ls -A "$subdir" 2>/dev/null)" ]; then
                echo "  ⚠️  Empty directory: $dir_name/"
              fi
            done
          done

          if [ $errors -gt 0 ]; then
            echo ""
            echo "❌ $errors error(s) found"
            exit 1
          fi
          echo ""
          echo "✅ All skills passed structure checks"

      - name: Check SKILL.md token counts
        shell: bash
        run: |
          set -euo pipefail
          MAX_TOKENS=3000
          errors=0

          for skill_md in skills/*/SKILL.md; do
            skill_name=$(basename "$(dirname "$skill_md")")
            # Approximate token count: words * 1.3 (conservative estimate)
            word_count=$(wc -w < "$skill_md")
            approx_tokens=$(echo "$word_count * 1.3" | bc | cut -d. -f1)

            if [ "$approx_tokens" -gt "$MAX_TOKENS" ]; then
              echo "❌ $skill_name: ~$approx_tokens tokens (max: $MAX_TOKENS)"
              errors=$((errors + 1))
            else
              echo "✅ $skill_name: ~$approx_tokens tokens"
            fi
          done

          if [ $errors -gt 0 ]; then
            echo ""
            echo "❌ $errors skill(s) exceed token limit"
            exit 1
          fi
          echo ""
          echo "✅ All SKILL.md files within token budget"

      - name: Validate SKILL.md references exist
        shell: bash
        run: |
          set -euo pipefail
          errors=0

          for skill_md in skills/*/SKILL.md; do
            skill_dir=$(dirname "$skill_md")
            skill_name=$(basename "$skill_dir")
            echo "📦 Checking references in: $skill_name"

            # Extract relative file paths from markdown links: [text](./path) or [text](path)
            refs=$(grep -oP '\]\(\./[^)]+\)|\]\(references/[^)]+\)|\]\(templates/[^)]+\)' "$skill_md" | sed 's/\](\.\/\(.*\))/\1/;s/\](\(.*\))/\1/' || true)

            for ref in $refs; do
              if [ ! -e "$skill_dir/$ref" ]; then
                echo "  ❌ Missing: $ref"
                errors=$((errors + 1))
              else
                echo "  ✅ Found: $ref"
              fi
            done
          done

          if [ $errors -gt 0 ]; then
            echo ""
            echo "❌ $errors broken reference(s) found"
            exit 1
          fi
          echo ""
          echo "✅ All references resolve"

  validate-actions:
    name: Validate Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check action structure
        shell: bash
        run: |
          set -euo pipefail
          errors=0

          for action_dir in actions/*/; do
            action_name=$(basename "$action_dir")
            echo "📦 Checking action: $action_name"

            if [ ! -f "$action_dir/action.yml" ]; then
              echo "  ❌ Missing action.yml"
              errors=$((errors + 1))
              continue
            fi
            echo "  ✅ action.yml exists"

            # Check required fields
            if ! grep -q '^name:' "$action_dir/action.yml"; then
              echo "  ❌ Missing 'name' field"
              errors=$((errors + 1))
            fi

            if ! grep -q '^description:' "$action_dir/action.yml"; then
              echo "  ❌ Missing 'description' field"
              errors=$((errors + 1))
            fi

            if ! grep -q "using: 'composite'" "$action_dir/action.yml" && \
               ! grep -q 'using: "composite"' "$action_dir/action.yml" && \
               ! grep -q 'using: composite' "$action_dir/action.yml"; then
              echo "  ❌ Not a composite action (missing 'using: composite')"
              errors=$((errors + 1))
            else
              echo "  ✅ Composite action"
            fi
          done

          if [ $errors -gt 0 ]; then
            echo ""
            echo "❌ $errors error(s) found"
            exit 1
          fi
          echo ""
          echo "✅ All actions passed structure checks"

      - name: Validate action YAML syntax
        shell: bash
        run: |
          set -euo pipefail
          errors=0

          for action_yml in actions/*/action.yml; do
            action_name=$(basename "$(dirname "$action_yml")")
            # Use python to validate YAML syntax
            if python3 -c "import yaml; yaml.safe_load(open('$action_yml'))" 2>/dev/null; then
              echo "✅ $action_name: valid YAML"
            else
              echo "❌ $action_name: invalid YAML"
              errors=$((errors + 1))
            fi
          done

          if [ $errors -gt 0 ]; then
            echo ""
            echo "❌ $errors action(s) have invalid YAML"
            exit 1
          fi
          echo ""
          echo "✅ All action YAML files are valid"
