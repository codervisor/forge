name: Rust Cross Build
description: Build a Rust binary for a specific target triple and upload it as a CI artifact.

inputs:
  target:
    description: Rust target triple (e.g. x86_64-apple-darwin)
    required: true
  packages:
    description: Cargo package name to build (e.g. ising-cli)
    required: true
  platform:
    description: Platform identifier used for the artifact name (e.g. darwin-x64)
    required: true
  binary-name:
    description: Name of the produced binary (e.g. ising). Defaults to the package name.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.target }}

    - name: Cache Rust build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ inputs.target }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ inputs.target }}-

    - name: Build binary
      shell: bash
      run: cargo build --release --target ${{ inputs.target }} --package ${{ inputs.packages }}

    - name: Stage binary
      shell: bash
      run: |
        BINARY_NAME="${{ inputs.binary-name }}"
        if [ -z "$BINARY_NAME" ]; then
          BINARY_NAME="${{ inputs.packages }}"
        fi

        IS_WINDOWS=false
        if [[ "${{ inputs.target }}" == *-windows-* ]]; then
          IS_WINDOWS=true
        fi

        EXT=""
        if [ "$IS_WINDOWS" = "true" ]; then
          EXT=".exe"
        fi

        SRC="target/${{ inputs.target }}/release/${BINARY_NAME}${EXT}"

        if [ ! -f "$SRC" ]; then
          echo "❌ Binary not found: $SRC"
          echo "Contents of target/${{ inputs.target }}/release/:"
          ls -la "target/${{ inputs.target }}/release/" 2>/dev/null || echo "(directory not found)"
          exit 1
        fi

        mkdir -p _binary_staging
        cp "$SRC" _binary_staging/
        echo "✅ Staged: $SRC → _binary_staging/${BINARY_NAME}${EXT}"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: binary-${{ inputs.platform }}
        path: _binary_staging/
        if-no-files-found: error
